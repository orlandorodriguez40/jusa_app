name: Flutter Release CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write
      actions: write

    env:
      FLUTTER_VERSION: '3.22.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Importante para que el build de Android no falle en macOS-latest
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      # --- SECCIÓN ANDROID (APK y AAB) ---
      - name: Build Android Release
        run: |
          # Generar el APK para instalación directa
          flutter build apk --release
          # Generar el AAB para subir a Google Play Console
          flutter build appbundle --release

      # --- SECCIÓN iOS PARA APPETIZE ---
      - name: Build iOS Simulator App
        run: |
          # 1. Limpieza de residuos de Windows
          rm -rf ios/Podfile ios/Podfile.lock ios/Flutter/podhelper.rb
          
          # 2. Re-generar archivos nativos de iOS
          flutter precache --ios
          flutter create . --platforms=ios
          
          # 3. FORZAR iOS 14.0 en el Podfile
          sed -i '' "s/.*platform :ios.*/platform :ios, '14.0'/" ios/Podfile
          
          # 4. Instalar CocoaPods
          cd ios
          pod install --repo-update
          cd ..
          
          # 5. Compilar para simulador
          flutter build ios --simulator --debug --no-codesign
          
          # 6. Crear el ZIP para Appetize.io
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

      # --- SUBIR ARTEFACTOS A ACTIONS ---
      - name: Upload Android Bundle (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload iOS Simulator (Appetize)
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/Runner.app.zip

      # --- CREAR RELEASE EN GITHUB ---
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Flutter Release ${{ github.ref_name }}
          artifacts: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
            build/ios/iphonesimulator/Runner.app.zip
          token: ${{ secrets.GITHUB_TOKEN }}