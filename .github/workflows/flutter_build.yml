name: Flutter Release CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write
      actions: write

    env:
      FLUTTER_VERSION: '3.22.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      # --- SECCIÓN ANDROID ---
      - name: Build Android APK
        run: |
          # Solo si tienes los secrets configurados, si no, comenta estas lineas
          # echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          flutter build apk --release

      # --- SECCIÓN iOS PARA APPETIZE (SOLUCIÓN DEFINITIVA) ---
      - name: Build iOS Simulator App
        run: |
          # 1. Forzar la creación de la carpeta ios/Flutter y archivos de ayuda
          # Esto soluciona el error "cannot load such file -- .../podhelper.rb"
          flutter precache --ios
          flutter create . --platforms=ios
          
          # 2. Asegurar que el Podfile use la versión 14.0 para Google Maps
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '14.0'/g" ios/Podfile || true
          
          # 3. Compilar para simulador
          flutter build ios --simulator --debug --no-codesign
          
          # 4. Comprimir para Appetize
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

      # --- SUBIR ARTEFACTOS ---
      - name: Upload iOS Simulator (Appetize)
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/Runner.app.zip

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk