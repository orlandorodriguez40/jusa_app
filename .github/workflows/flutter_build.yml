name: Flutter Release CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write
      actions: write

    env:
      FLUTTER_VERSION: '3.22.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      # --- SECCIÓN ANDROID ---
      - name: Build Android APK
        run: |
          # Si tienes configurados los secrets en GitHub, esto funcionará. 
          # Si no, generará un APK sin firmar.
          flutter build apk --release

      # --- SECCIÓN iOS PARA APPETIZE (SOLUCIÓN DEFINITIVA) ---
      - name: Build iOS Simulator App
        run: |
          # 1. Limpieza de residuos de Windows
          rm -rf ios/Podfile ios/Podfile.lock ios/Flutter/podhelper.rb
          
          # 2. Re-generar archivos nativos de iOS en el servidor Mac
          flutter precache --ios
          flutter create . --platforms=ios
          
          # 3. FORZAR iOS 14.0 en el Podfile
          # Este comando busca cualquier línea de 'platform' y la reemplaza por la correcta
          sed -i '' "s/.*platform :ios.*/platform :ios, '14.0'/" ios/Podfile
          
          # 4. Instalar CocoaPods con la nueva configuración
          cd ios
          pod install --repo-update
          cd ..
          
          # 5. Compilar para simulador (No requiere cuenta de Apple de $99)
          flutter build ios --simulator --debug --no-codesign
          
          # 6. Crear el ZIP para Appetize.io
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

      # --- SUBIR ARTEFACTOS ---
      - name: Upload iOS Simulator (Appetize)
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/Runner.app.zip

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # --- CREAR RELEASE EN GITHUB (Solo si subes un Tag como v1.0.0) ---
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Flutter Release ${{ github.ref_name }}
          artifacts: |
            build/app/outputs/flutter-apk/app-release.apk
            build/ios/iphonesimulator/Runner.app.zip
          token: ${{ secrets.GITHUB_TOKEN }}